name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Configure git for private modules
        run: git config --global url."https://${{ secrets.RELEASES_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - run: go build ./...
        env:
          GOPRIVATE: github.com/GoCodeAlone/*
          GONOSUMCHECK: github.com/GoCodeAlone/*
      - run: go test ./... -v -race -count=1
        env:
          GOPRIVATE: github.com/GoCodeAlone/*
          GONOSUMCHECK: github.com/GoCodeAlone/*
  windows-provider-journal:
    runs-on: [self-hosted, Windows, X64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify Windows journal directory durability
        shell: pwsh
        run: go test ./internal -run '^TestT916RunnerProviderWindowsDirectorySyncUsesWriteCapableHandle$' -count=1
        env:
          GOPRIVATE: github.com/GoCodeAlone/*
          GONOSUMCHECK: github.com/GoCodeAlone/*
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://${{ secrets.RELEASES_TOKEN }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/
