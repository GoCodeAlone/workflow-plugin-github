syntax = "proto3";
package workflow.plugin.github.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/GoCodeAlone/workflow-plugin-github/gen;githubv1";

// WebhookModuleConfig is the typed config for the git.webhook module type.
// Registers an HTTP handler that validates GitHub webhook signatures and
// publishes normalized GitEvent messages to a host EventBus topic.
message WebhookModuleConfig {
  // provider identifies the git provider. Default: "github".
  string provider = 1;
  // secret is the HMAC-SHA256 shared secret used to validate webhook payloads.
  string secret = 2;
  // events is the list of GitHub event types to forward (empty = all events).
  repeated string events = 3;
  // topic is the EventBus topic to publish normalized events to. Default: "git.events".
  string topic = 4;
}

// GitHubAppModuleConfig is the typed config for the github.app module type.
// Manages GitHub App authentication; generates installation access tokens from
// an App private key and installation ID.
message GitHubAppModuleConfig {
  // app_id is the numeric GitHub App ID.
  int64 app_id = 1;
  // installation_id is the installation ID for the target org or user account.
  int64 installation_id = 2;
  // private_key is the PEM-encoded RSA private key for the GitHub App.
  string private_key = 3;
}

// RunnerProviderModuleConfig is the typed config for the github.runner_provider module type.
// Exposes an HTTP API for provisioning ephemeral GitHub Actions self-hosted runner tokens.
message RunnerProviderModuleConfig {
  // token is the GitHub personal access token with actions:write scope.
  string token = 1;
  // provider_token is the shared secret that callers must present to the provider API.
  string provider_token = 2;
  // api_base_url is the GitHub API base URL. Default: "https://api.github.com".
  string api_base_url = 3;
  // repositories is the allowlist of "owner/repo" strings the provider will serve tokens for.
  repeated string repositories = 4;
}

